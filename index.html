<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg:#05050a;--surface:#0c0c16;--border:rgba(255,255,255,0.06);
  --purple:#a855f7;--rose:#f43f5e;--gold:#fbbf24;
  --cyan:#22d3ee;--green:#10b981;--text:#e2e8f0;--muted:#64748b;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:none}
#cur{position:fixed;width:18px;height:18px;border:1.5px solid var(--purple);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:screen}
#dot{position:fixed;width:5px;height:5px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 8px var(--cyan)}
@media(hover:none){#cur,#dot{display:none}body{cursor:auto}}
.mesh{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(168,85,247,.08) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(34,211,238,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(244,63,94,.04) 0%,transparent 70%);animation:drift 25s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.02)}66%{transform:translate(-15px,20px) scale(.98)}}
/* HEADER */
header{position:sticky;top:0;z-index:100;padding:1.1rem 1.6rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(5,5,10,.92);backdrop-filter:blur(24px)}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.5px;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.hright{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.chip{padding:.2rem .6rem;border-radius:999px;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.chip-online{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.chip-offline{background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.25);color:var(--muted)}
.badge{display:none;padding:.2rem .7rem;border-radius:999px;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;align-items:center;gap:.3rem}
.badge.show{display:flex}
.badge-v{background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);color:var(--cyan)}
.badge-a{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.hbtn{border-radius:10px;padding:.44rem .9rem;font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem}
.hbtn-view{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);color:var(--cyan)}
.hbtn-view:hover{background:rgba(34,211,238,.2);box-shadow:0 0 18px rgba(34,211,238,.25)}
.hbtn-view.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:#f87171}
.hbtn-admin{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:var(--purple)}
.hbtn-admin:hover{background:rgba(168,85,247,.2);box-shadow:0 0 18px rgba(168,85,247,.25)}
.hbtn-admin.active{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444}
.inst-btn{display:none;align-items:center;gap:.4rem;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);border-radius:8px;padding:.3rem .7rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.68rem;color:var(--purple);transition:all .2s}
.inst-btn.show{display:flex}
/* PROGRESS */
.prog{position:fixed;top:0;left:0;right:0;height:2px;z-index:999}
.prog-f{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--rose),var(--gold));background-size:200%;animation:sh 2s linear infinite;transition:width .45s ease}
@keyframes sh{0%{background-position:0%}100%{background-position:200%}}
/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(5,5,10,.97);border:1px solid rgba(168,85,247,.35);border-radius:999px;padding:.5rem 1.3rem;font-size:.76rem;font-weight:600;color:var(--text);z-index:600;transition:transform .4s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(14px);pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:calc(100vw - 2rem);overflow:hidden;text-overflow:ellipsis}
.toast.show{transform:translateX(-50%) translateY(0)}
/* MAIN */
main{position:relative;z-index:10;padding:1.8rem 1.4rem 4rem;max-width:1600px;margin:0 auto}
.sec-label{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem;display:flex;align-items:center;gap:.8rem}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* SETUP NOTICE */
.notice{display:none;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.25);border-radius:14px;padding:1rem 1.3rem;margin-bottom:1.3rem}
.notice.show{display:block}
.notice-t{font-size:.78rem;font-weight:700;color:var(--gold);margin-bottom:.35rem}
.notice-b{font-size:.7rem;color:var(--muted);line-height:1.7}
.notice-b code{background:rgba(255,255,255,.08);padding:.1rem .4rem;border-radius:4px;font-size:.68rem;color:var(--text)}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1.1rem}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.3rem;position:relative;overflow:hidden;min-height:290px;display:flex;flex-direction:column;transition:all .3s cubic-bezier(.23,1,.32,1)}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(var(--ar),.06) 0%,transparent 60%);pointer-events:none}
.card:hover{border-color:rgba(var(--ar),.42);box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 1px rgba(var(--ar),.15);transform:translateY(-4px)}
.card-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.9rem}
.cnum{width:29px;height:29px;border-radius:9px;flex-shrink:0;background:rgba(var(--ar),.15);border:1px solid rgba(var(--ar),.32);color:rgba(var(--ar),1);font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.ctitle{font-size:.74rem;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cdot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.cdot.empty{background:var(--muted);opacity:.35}
/* CARD BODY */
.cbody{flex:1;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:145px;position:relative;cursor:pointer;transition:all .2s}
.cbody:hover{background:rgba(var(--ar),.05);border-color:rgba(var(--ar),.15)}
.cbody.locked{cursor:default}
.cbody.locked:hover{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04)}
.preview{display:flex;flex-direction:column;align-items:center;gap:.65rem;padding:1.4rem 1rem;text-align:center}
.prev-icon{font-size:2.2rem}
.prev-name{font-size:.9rem;font-weight:700;color:var(--text);word-break:break-all}
.prev-hint{font-size:.64rem;color:var(--muted)}
.lock-state{display:flex;flex-direction:column;align-items:center;gap:.55rem;padding:1.4rem 1rem;text-align:center;opacity:.55}
.lock-icon{font-size:1.8rem}
.lock-text{font-size:.68rem;color:var(--muted);line-height:1.5}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1.4rem 1rem;text-align:center;opacity:.45}
.empty-icon{font-size:1.8rem}
.empty-text{font-size:.68rem;color:var(--muted);line-height:1.5}
/* SPINNER */
.spin-wrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,5,10,.85);border-radius:12px;backdrop-filter:blur(4px)}
.spin-wrap.on{display:flex}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:rgba(var(--ar),1);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* CARD FOOTER */
.cfoot{display:flex;gap:.5rem;margin-top:.85rem;flex-wrap:wrap}
.sbtn{flex:1;padding:.48rem .4rem;border-radius:9px;border:1px solid;font-family:'DM Sans',sans-serif;font-size:.67rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.28rem;min-width:0;white-space:nowrap}
.sbtn-open{background:rgba(var(--ar),.1);border-color:rgba(var(--ar),.3);color:rgba(var(--ar),1)}
.sbtn-open:hover{background:rgba(var(--ar),.22);box-shadow:0 0 14px rgba(var(--ar),.25)}
.sbtn-up{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.25);color:var(--purple)}
.sbtn-up:hover{background:rgba(168,85,247,.18);box-shadow:0 0 12px rgba(168,85,247,.22)}
.sbtn-del{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.22);color:#ef4444;flex:0;padding:.48rem .65rem}
.sbtn-del:hover{background:rgba(239,68,68,.18);box-shadow:0 0 12px rgba(239,68,68,.2)}
.soon{font-size:.62rem;color:var(--muted);text-align:center;width:100%;padding:.35rem 0}
/* ADD SLOT BUTTON */
.add-slot-wrap{display:none;margin-top:1.4rem;text-align:center}
.add-slot-btn{background:rgba(168,85,247,.07);border:1.5px dashed rgba(168,85,247,.38);border-radius:16px;padding:.85rem 2.4rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--purple);cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:.55rem}
.add-slot-btn:hover{background:rgba(168,85,247,.15);box-shadow:0 0 24px rgba(168,85,247,.18);border-color:rgba(168,85,247,.6);transform:translateY(-2px)}
.add-slot-btn:active{transform:translateY(0)}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.83);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid rgba(168,85,247,.3);border-radius:24px;padding:1.9rem;width:100%;max-width:370px;box-shadow:0 0 80px rgba(168,85,247,.18);animation:mIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{transform:scale(.82) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-t{font-family:'Syne',sans-serif;font-size:1.08rem;font-weight:800;color:var(--text);margin-bottom:.3rem}
.modal-s{font-size:.7rem;color:var(--muted);margin-bottom:1.3rem;line-height:1.6}
.modal.viewer-modal{border-color:rgba(34,211,238,.3);box-shadow:0 0 80px rgba(34,211,238,.15)}
.modal.viewer-modal .modal-t{background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal.admin-modal{border-color:rgba(168,85,247,.3)}
.inp-wrap{position:relative}
.pwd-in{width:100%;padding:.78rem 2.6rem .78rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;letter-spacing:2px}
.pwd-in:focus{border-color:rgba(168,85,247,.5)}
.viewer-modal .pwd-in:focus{border-color:rgba(34,211,238,.5)}
.pwd-in.err{border-color:rgba(239,68,68,.6);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.eye{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:1rem;user-select:none;transition:color .2s}
.eye:hover{color:var(--text)}
.merr{font-size:.7rem;color:#ef4444;margin-top:.5rem;display:none;text-align:center}
.merr.show{display:block}
.mtries{font-size:.64rem;color:var(--muted);margin-top:.3rem;text-align:center;display:none}
.mtries.show{display:block}
.mbtns{display:flex;gap:.65rem;margin-top:1.15rem}
.mbtn{flex:1;padding:.7rem;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.mbtn-ok{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.viewer-modal .mbtn-ok{background:linear-gradient(135deg,var(--cyan),var(--green));color:#05050a}
.mbtn-ok:hover{box-shadow:0 4px 20px rgba(168,85,247,.4);transform:translateY(-1px)}
.mbtn-cancel{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}
.mbtn-cancel:hover{background:rgba(255,255,255,.1);color:var(--text)}
.vkey-note{margin-top:.9rem;padding:.7rem .9rem;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);border-radius:10px;font-size:.68rem;color:var(--gold);line-height:1.6;display:none}
.vkey-note.show{display:block}
/* VIEWER */
#viewer{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column}
#viewer.open{display:flex}
.vbar{height:48px;background:rgba(5,5,10,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;padding:0 1rem;flex-shrink:0}
.vbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.28rem .65rem;font-size:.68rem;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.vbtn:hover{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:var(--text)}
.vtitle{font-size:.72rem;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vframe{flex:1;border:none;width:100%;background:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(168,85,247,.3);border-radius:2px}
</style>
</head>
<body>
<div id="cur"></div><div id="dot"></div>
<div class="mesh"></div>
<div class="prog"><div class="prog-f" id="prog"></div></div>
<div class="toast" id="toast"></div>

<header>
  <div>
    <div class="brand">&#x26A1; aiAkash Vault</div>
    <div class="brand-sub">Secure Feature Launcher</div>
  </div>
  <div class="hright">
    <span class="chip chip-online" id="nchip">&#x1F310; Online</span>
    <div class="badge badge-v" id="vbadge">&#x1F441;&#xFE0F; Viewer</div>
    <div class="badge badge-a" id="abadge">&#x2705; Admin</div>
    <button class="inst-btn" id="instBtn">&#x1F4F2; Install</button>
    <button class="hbtn hbtn-view"  id="viewBtn"  onclick="openModal('viewer')">&#x1F513; View</button>
    <button class="hbtn hbtn-admin" id="adminBtn" onclick="openModal('admin')">&#x2699;&#xFE0F; Admin</button>
  </div>
</header>

<main>
  <div class="sec-label" id="secLabel">Secure Feature Slots</div>
  <div class="notice" id="notice">
    <div class="notice-t">&#x2699;&#xFE0F; Firebase Setup Required</div>
    <div class="notice-b">
      <code>FIREBASE_URL</code> ko apne Firebase Realtime Database URL se replace karo.

  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-t" id="modal-title">&#x1F510; Access</div>
    <div class="modal-s" id="modal-sub">Password enter karo</div>
    <div class="inp-wrap">
      <input type="password" class="pwd-in" id="pwdIn"
             placeholder="Password enter karo..."
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doVerify()">
      <span class="eye" id="eyeEl" onclick="toggleEye()">&#x1F441;&#xFE0F;</span>
    </div>
    <div class="vkey-note" id="vkeyNote">
      &#x26A0;&#xFE0F; Upload ke liye Viewer Password bhi chahiye.
    </div>
    <div class="merr"   id="merr"></div>
    <div class="mtries" id="mtries"></div>
    <div class="mbtns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-ok" id="mok" onclick="doVerify()">Unlock</button>
    </div>
  </div>
</div>

<input type="file" id="fileIn" accept=".html,.htm,.pdf,.svg,.txt,.png,.jpg,.jpeg,.gif,.webp" style="display:none">

<div id="viewer">
  <div class="vbar">
    <button class="vbtn" onclick="closeViewer()">&#x2715; Close</button>
    <span class="vtitle" id="vtitle">-</span>
    <button class="vbtn" onclick="reloadV()">&#x21BA; Reload</button>
    <button class="vbtn" onclick="goFull()">&#x26F6; Fullscreen</button>
  </div>
  <iframe id="vframe"
    sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-downloads"
    allow="autoplay; fullscreen; camera; microphone"></iframe>
</div>

<script>
/* ══════════════════════════════════════
   FIREBASE CONFIG — DO NOT CHANGE
══════════════════════════════════════ */
const FIREBASE_URL = 'scoreakash-default-rtdb.firebaseio.com';

/* ══════════════════════════════════════
   SECURITY SENTINELS — DO NOT CHANGE
   AES-GCM encrypted proof. No password stored.
══════════════════════════════════════ */
const VIEWER_SENTINEL = {
  data: 'PNTYk0VWL77ENh6Ovl5YIfiTJNB4OngRHAWugb0g9mMgYN7WE2GT1DCLRHcb',
  iv:   'RG9wYU1pbmRWSUVXMjAyNQ=='
};
const ADMIN_SENTINEL = {
  data: 'CBMeaXiEFLnoHUkGZjNKZq3uoI+6oCMncp1Ubxzd7zqFp/DQx4PmRm86fnQ=',
  iv:   'RG9wYU1pbmRBRE1OMjAyNQ=='
};
const VIEWER_SALT = 'DopaMind-Viewer-Auth-Salt-2025';
const ADMIN_SALT  = 'DopaMind-Admin-Auth-Salt-2025';

/* ══════════════════════════════════════
   CONFIG — dynamic slot count
══════════════════════════════════════ */
const DEFAULT_SLOTS = 20;
let   SLOTS = DEFAULT_SLOTS; // updated from Firebase /meta/totalSlots

/* Icon & color sets — cycle for any slot index */
const ICON_SET = ['⚡','🔥','🌟','🎯','🚀','💡','🎮','🔮','🌈','⚗️','🧬','🤖','🎭','🏆','💎','🌙','⭐','🎪','🔬','🌀'];
const CLR_SET  = ['168,85,247','244,63,94','251,191,36','34,211,238','16,185,129'];

function getIcon(i)  { return ICON_SET[i % ICON_SET.length]; }
function getColor(i) { return CLR_SET[i  % CLR_SET.length];  }
function getName(i)  { return `Feature ${i+1}`; }

const HAS_ZIP = typeof CompressionStream !== 'undefined';

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let viewerKey = null, isViewer = false, isAdmin = false;
let failV = 0, failA = 0, lockV = 0, lockA = 0;
let modalMode = 'viewer', uploadTarget = null, blobURL = null;
let slots = {};

/* ══════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════ */

/* ══════════════════════════════════════
   BASE64 — CHUNK-SAFE (fixes >100KB bug)
   Old: btoa(String.fromCharCode(...bigArray)) → stack overflow for large files
   Fix: process 8192 bytes at a time
══════════════════════════════════════ */
function b64e(buf){
  const bytes=new Uint8Array(buf);
  let str='';const CHUNK=8192;
  for(let i=0;i<bytes.length;i+=CHUNK)
    str+=String.fromCharCode(...bytes.subarray(i,Math.min(i+CHUNK,bytes.length)));
  return btoa(str);
}
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

/* ══════════════════════════════════════
   COMPRESSION — shrinks HTML 60-80%
══════════════════════════════════════ */
async function compress(str){
  if(!HAS_ZIP) return new TextEncoder().encode(str);
  const blob=new Blob([str]);
  const stream=blob.stream().pipeThrough(new CompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function decompress(bytes){
  if(!HAS_ZIP) return new TextDecoder().decode(bytes);
  const blob=new Blob([bytes]);
  const stream=blob.stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Response(stream).text();
}

/* ══════════════════════════════════════
   CRYPTO
══════════════════════════════════════ */
async function deriveKey(password,salt){
  const mat=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:new TextEncoder().encode(salt),iterations:120000,hash:'SHA-256'},
    mat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
/* Sentinel verify — plain text, no compression */
async function tryDecrypt(key,dataB64,ivB64){
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB64)},key,b64d(dataB64));
  return new TextDecoder().decode(dec);
}
/* HTML encrypt: compress → encrypt. z=1 means compressed. */
async function encryptHTML(key,htmlStr){
  const bytes=await compress(htmlStr);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,bytes);
  return{data:b64e(enc),iv:b64e(iv.buffer),z:HAS_ZIP?1:0};
}
/* HTML decrypt: decrypt → decompress if z=1. Backward compatible with old slots (no z). */
async function decryptHTML(key,dataB64,ivB64,isCompressed){
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB64)},key,b64d(dataB64));
  if(isCompressed&&HAS_ZIP) return decompress(new Uint8Array(dec));
  return new TextDecoder().decode(dec);
}
/* Binary file helpers — for PDF, DOCX, TXT */
async function compressBytes(bytes){
  if(!HAS_ZIP) return bytes instanceof Uint8Array?bytes:new Uint8Array(bytes);
  const blob=new Blob([bytes]);
  const stream=blob.stream().pipeThrough(new CompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function decompressBytes(bytes){
  if(!HAS_ZIP) return bytes instanceof Uint8Array?bytes:new Uint8Array(bytes);
  const blob=new Blob([bytes]);
  const stream=blob.stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function encryptFile(key,bytes){
  const compressed=await compressBytes(bytes);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,compressed);
  return{data:b64e(enc),iv:b64e(iv.buffer),z:HAS_ZIP?1:0};
}
async function decryptFile(key,dataB64,ivB64,isCompressed){
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ivB64)},key,b64d(dataB64));
  if(isCompressed&&HAS_ZIP) return decompressBytes(new Uint8Array(dec));
  return new Uint8Array(dec);
}
function getMimeType(name){
  if(name.match(/\.(html|htm)$/i)) return 'text/html';
  if(name.match(/\.pdf$/i))        return 'application/pdf';
  if(name.match(/\.svg$/i))        return 'image/svg+xml';
  if(name.match(/\.txt$/i))        return 'text/plain';
  if(name.match(/\.png$/i))        return 'image/png';
  if(name.match(/\.jpe?g$/i))      return 'image/jpeg';
  if(name.match(/\.gif$/i))        return 'image/gif';
  if(name.match(/\.webp$/i))       return 'image/webp';
  return 'text/html';
}

function fbMeta(){return fbRoot()+'/meta'}

/* Load totalSlots from Firebase */
async function loadMeta(){
  try{
    const r=await fetch(fbMeta()+'/totalSlots.json');
    const n=await r.json();
    if(n&&typeof n==='number'&&n>=DEFAULT_SLOTS) SLOTS=n;
  }catch(e){}
}

    await fetch(fbMeta()+'/totalSlots.json',{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(SLOTS)
    });
  }catch(e){}
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function renderCard(i,parent){
  const slot=slots[i]||null;
  const has=!!(slot&&slot.data&&slot.iv);
  const ar=getColor(i);
  const el=document.createElement('div');
  el.className='card';el.id=`card-${i}`;el.style.cssText=`--ar:${ar}`;

  let body='',foot='';

  if(has&&isViewer){
    body=`<div class="preview"><div class="prev-icon">${getIcon(i)}</div><div class="prev-name">${esc(slot.name)}</div><div class="prev-hint">&#x1F446; Click — open hoga</div></div>`;
    if(isAdmin){
      foot=`<button class="sbtn sbtn-open" onclick="openSlot(${i})">&#x25B6; Open</button><button class="sbtn sbtn-up" onclick="startUpload(${i})">&#x2191; Replace</button><button class="sbtn sbtn-del" onclick="confirmDel(${i})">&#x1F5D1;&#xFE0F;</button>`;
    }else{
      foot=`<button class="sbtn sbtn-open" onclick="openSlot(${i})">&#x25B6; Features Kholo</button>`;
    }
  }else if(has&&!isViewer){
    body=`<div class="lock-state"><div class="lock-icon">&#x1F512;</div><div class="lock-text">Content locked<br>View unlock karo</div></div>`;
    if(isAdmin){
      foot=`<button class="sbtn sbtn-up" onclick="startUpload(${i})">&#x2191; Replace</button><button class="sbtn sbtn-del" onclick="confirmDel(${i})">&#x1F5D1;&#xFE0F;</button>`;
    }else{
      foot=`<div class="soon">&#x1F512; Viewer password chahiye</div>`;
    }
  }else if(!has&&isAdmin){
    body=`<div class="empty-state"><div class="empty-icon">&#x1F4ED;</div><div class="empty-text">Khali Slot<br>Upload karo</div></div>`;
    foot=`<button class="sbtn sbtn-up" onclick="startUpload(${i})">&#x2191; Upload</button>`;
  }else{
    body=`<div class="empty-state"><div class="empty-icon">&#x1F4ED;</div><div class="empty-text">Jald aayega...</div></div>`;
    foot=`<div class="soon">Coming soon...</div>`;
  }

  el.innerHTML=`
    <div class="card-head">
      <div class="cnum">${i+1}</div>
      <div class="ctitle">${has?esc(slot.name):getName(i)}</div>
      <div class="cdot ${has?'live':'empty'}"></div>
    </div>
    <div class="cbody ${(has&&isViewer)?'':'locked'}" id="body-${i}">
      ${body}
      <div class="spin-wrap" id="spin-${i}"><div class="spin" style="--ar:${ar}"></div></div>
    </div>
    <div class="cfoot">${foot}</div>`;

  if(has&&isViewer) el.querySelector('.cbody').onclick=()=>openSlot(i);
  if(parent) parent.appendChild(el);
  else{const old=document.getElementById(`card-${i}`);if(old)old.replaceWith(el);}
}

/* ══════════════════════════════════════
   OPEN SLOT → IFRAME VIEWER
══════════════════════════════════════ */
async function openSlot(i){
  if(!isViewer||!viewerKey){toast('Pehle View unlock karo');return}
  const slot=slots[i];if(!slot||!slot.data)return;
  setSpin(i,true);
  try{
    const mime=slot.mime||getMimeType(slot.name||'');
    let blobData;
    if(!slot.mime&&(slot.name||'').match(/\.(html|htm)$/i)){
      blobData=await decryptHTML(viewerKey,slot.data,slot.iv,!!slot.z);
    }else{
      blobData=await decryptFile(viewerKey,slot.data,slot.iv,!!slot.z);
    }
    const blob=new Blob([blobData],{type:mime});
    if(blobURL)URL.revokeObjectURL(blobURL);
    blobURL=URL.createObjectURL(blob);
    const f=document.getElementById('vframe');f.src='';
    requestAnimationFrame(()=>{
      f.src=blobURL;
      document.getElementById('vtitle').textContent=`${i+1}. ${slot.name}`;
      document.getElementById('viewer').classList.add('open');
    });
  }catch(e){toast('File khul nahi payi')}
  setSpin(i,false);
}
function setSpin(i,on){const e=document.getElementById(`spin-${i}`);if(e)e.classList.toggle('on',on)}
function closeViewer(){document.getElementById('viewer').classList.remove('open');document.getElementById('vframe').src='';if(blobURL){URL.revokeObjectURL(blobURL);blobURL=null}}
function reloadV(){if(!blobURL)return;const f=document.getElementById('vframe');f.src='';requestAnimationFrame(()=>f.src=blobURL)}
function goFull(){const v=document.getElementById('viewer');if(!document.fullscreenElement)v.requestFullscreen().catch(()=>{});else document.exitFullscreen()}

/* ══════════════════════════════════════
   UPLOAD — NO SIZE LIMIT
   (compression handles large files,
    chunk-safe b64e handles encoding)
══════════════════════════════════════ */
function startUpload(i){
  if(!isAdmin){toast('Admin mode chahiye');return}
  if(!isViewer||!viewerKey){
    toast('Pehle View unlock karo',4000);openModal('viewer');uploadTarget=i;return;
  }
  uploadTarget=i;
  const fi=document.getElementById('fileIn');fi.value='';fi.click();
}

document.getElementById('fileIn').addEventListener('change',async e=>{
  const file=e.target.files[0];
  if(!file||uploadTarget===null)return;
  const idx=uploadTarget;uploadTarget=null;
  if(!file.name.match(/\.(html|htm|pdf|svg|txt|png|jpg|jpeg|gif|webp)$/i)){toast('Sirf browser-compatible files: HTML, PDF, SVG, TXT, Images');return}
  // NO SIZE LIMIT — compression + chunked encoding handles any size
  if(!viewerKey){toast('Viewer key nahi mila');return}
  setSpin(idx,true);pStart();
  const kb=(file.size/1024).toFixed(0);
  toast(`Compressing & Encrypting ${kb}KB...`);
  try{
    const bytes=new Uint8Array(await file.arrayBuffer());
    const {data,iv,z}=await encryptFile(viewerKey,bytes);
    toast('Firebase par upload ho raha hai...');
    const obj={name:file.name,data,iv,z,at:Date.now(),size:file.size,mime:file.type||getMimeType(file.name)};
    await fbSet(idx,obj);
    slots[idx]=obj;renderCard(idx,null);pEnd();setSpin(idx,false);
    toast(`✅ Slot ${idx+1} — "${file.name}" (${kb}KB) upload ho gayi!`,5000);
  }catch(err){
    pEnd();setSpin(idx,false);
    toast('Upload failed — Internet check karo',4000);
    console.error(err);
  }
});

function confirmDel(i){
  if(!isAdmin)return;
  if(!confirm(`Slot ${i+1} — "${slots[i]?.name}" delete karo?`))return;
  doDelete(i);
}
async function doDelete(i){
  setSpin(i,true);pStart();
  try{
    await fbDel(i);delete slots[i];renderCard(i,null);pEnd();
    toast(`Slot ${i+1} clear — ab nayi file upload karo`);
  }catch(e){pEnd();toast('Delete failed')}
  setSpin(i,false);
}

function openModal(mode){
  if(mode==='viewer'&&isViewer){
    isViewer=false;viewerKey=null;
    document.getElementById('vbadge').classList.remove('show');
    document.getElementById('viewBtn').classList.remove('active');
    document.getElementById('viewBtn').textContent='🔓 View';
    renderAll();toast('Viewer mode band');return;
  }
  if(mode==='admin'&&isAdmin){
    isAdmin=false;
    document.getElementById('abadge').classList.remove('show');
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminBtn').textContent='⚙️ Admin';
    renderAll();toast('Admin mode band');return;
  }
  modalMode=mode;
  const mo=document.getElementById('modal');
  mo.className='modal '+(mode==='viewer'?'viewer-modal':'admin-modal');
  document.getElementById('modal-title').textContent=mode==='viewer'?'👁️ Viewer Access':'⚙️ Admin Access';
  document.getElementById('modal-sub').textContent=mode==='viewer'?'View karne ke liye Viewer Password dalo':'Upload & Delete ke liye Admin Password dalo';
  document.getElementById('mok').textContent=mode==='viewer'?'👁️ Unlock View':'⚙️ Unlock Admin';
  document.getElementById('pwdIn').value='';
  document.getElementById('pwdIn').type='password';
  document.getElementById('eyeEl').textContent='👁️';
  document.getElementById('merr').classList.remove('show');
  document.getElementById('mtries').classList.remove('show');
  document.getElementById('vkeyNote').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pwdIn').focus(),280);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');uploadTarget=null}
function toggleEye(){const i=document.getElementById('pwdIn'),e=document.getElementById('eyeEl');if(i.type==='password'){i.type='text';e.textContent='🙈'}else{i.type='password';e.textContent='👁️'}}

async function doVerify(){
  const now=Date.now();
  if(modalMode==='viewer'&&now<lockV){toast(`${Math.ceil((lockV-now)/1000)}s baad try karo`);closeModal();return}
  if(modalMode==='admin'&&now<lockA){toast(`${Math.ceil((lockA-now)/1000)}s baad try karo`);closeModal();return}
  const val=document.getElementById('pwdIn').value;if(!val)return;
  const sentinel=modalMode==='viewer'?VIEWER_SENTINEL:ADMIN_SENTINEL;
  const salt=modalMode==='viewer'?VIEWER_SALT:ADMIN_SALT;
  let key;try{key=await deriveKey(val,salt);}catch(e){showErr();return}
  let ok=false;
  try{const dec=await tryDecrypt(key,sentinel.data,sentinel.iv);ok=dec.startsWith('DOPAMIND_');}catch(_){ok=false}
  if(ok){
    if(modalMode==='viewer'){
      isViewer=true;viewerKey=key;failV=0;
      document.getElementById('vbadge').classList.add('show');
      document.getElementById('viewBtn').classList.add('active');
      document.getElementById('viewBtn').innerHTML='🔓 View ON';
      closeModal();renderAll();toast('✅ Viewer Mode ON');
      if(uploadTarget!==null){const t=uploadTarget;uploadTarget=null;setTimeout(()=>startUpload(t),300)}
    }else{
      isAdmin=true;failA=0;
      document.getElementById('abadge').classList.add('show');
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminBtn').innerHTML='⚙️ Admin ON';
      closeModal();renderAll();toast('✅ Admin Mode ON — Add Slot button neeche hai');
    }
  }else{
    showErr();
    if(modalMode==='viewer'){failV++;if(failV>=5){lockV=Date.now()+30000;failV=0;closeModal();toast('5 baar galat — 30s lock',4000);return}const r=5-failV;if(r<=3){document.getElementById('mtries').textContent=`${r} attempts bache`;document.getElementById('mtries').classList.add('show')}}
    else{failA++;if(failA>=5){lockA=Date.now()+30000;failA=0;closeModal();toast('5 baar galat — 30s lock',4000);return}const r=5-failA;if(r<=3){document.getElementById('mtries').textContent=`${r} attempts bache`;document.getElementById('mtries').classList.add('show')}}
    document.getElementById('pwdIn').value='';document.getElementById('pwdIn').focus();
  }
}
function showErr(){
  const i=document.getElementById('pwdIn');i.classList.add('err');setTimeout(()=>i.classList.remove('err'),400);
  const e=document.getElementById('merr');e.textContent='❌ Galat Password!';e.classList.add('show');
}
